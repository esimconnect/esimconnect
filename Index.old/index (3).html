<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#080b12"/>
  <title>eSIM Connect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080b12;--surface:#0e1420;--surface2:#141b2a;
      --border:rgba(255,255,255,0.07);--text:#f0f4ff;--muted:#7a8aaa;
      --accent:#00e5ff;--green:#00e096;--gold:#ffd166;--red:#ff5050;
      --radius:16px;--nav-h:64px;
      --ff-head:'Syne',sans-serif;--ff-body:'DM Sans',sans-serif;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--ff-body)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .fu{animation:fadeUp .4s ease forwards}
    /* LAYOUT */
    /* DESKTOP: phone frame centered */
    #app{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 30% 20%,rgba(0,229,255,.06),transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(0,224,150,.04),transparent 60%),var(--bg);padding:20px}
    .phone{width:390px;height:844px;background:var(--bg);border-radius:50px;border:2px solid rgba(255,255,255,.1);overflow:hidden;position:relative;box-shadow:0 40px 100px rgba(0,0,0,.9),0 0 0 1px rgba(255,255,255,.03),inset 0 0 0 1px rgba(255,255,255,.02);display:flex;flex-direction:column;flex-shrink:0}
    .island{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:120px;height:34px;background:#000;border-radius:20px;z-index:200;pointer-events:none;box-shadow:0 0 0 1px rgba(255,255,255,.06)}
    .sbar{height:54px;flex-shrink:0;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 10px;position:relative;z-index:10}
    .stime{font-family:var(--ff-head);font-size:15px;font-weight:700}
    .sicons{font-size:12px;display:flex;gap:6px;align-items:center}
    .swrap{flex:1;overflow:hidden;position:relative}
    .screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:calc(var(--nav-h) + 16px)}
    .screen::-webkit-scrollbar{display:none}
    /* MOBILE: fullscreen */
    @media(max-width:500px){
      #app{padding:0;background:var(--bg);align-items:stretch;justify-content:stretch;min-height:100vh;min-height:100dvh}
      .phone{width:100%;height:100vh;height:100dvh;border-radius:0;border:none;box-shadow:none}
      .island{display:none}
      .sbar{display:none}
    }
    /* BOTTOM NAV */
    .bnav{position:absolute;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(8,11,18,.96);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;z-index:100;padding-bottom:8px}
    .ni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:8px 10px;border-radius:12px;color:var(--muted);font-size:10px;font-weight:600;letter-spacing:.3px;transition:color .2s;min-width:44px}
    .ni.on{color:var(--accent)}
    .ni .ico{font-size:20px;transition:transform .2s;display:block}
    .ni.on .ico{transform:translateY(-2px)}
    /* HEADER */
    .hdr{padding:20px 20px 14px;background:linear-gradient(180deg,var(--surface),transparent);position:sticky;top:0;z-index:50;backdrop-filter:blur(10px)}
    .hrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .logo{font-family:var(--ff-head);font-size:22px;font-weight:800;letter-spacing:-.5px}
    .logo b{color:var(--accent);font-weight:800}
    .lbadge{font-size:11px;background:rgba(0,224,150,.1);color:var(--green);padding:4px 10px;border-radius:20px;font-weight:700}
    /* SEARCH */
    .srch{position:relative}
    .srch input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:11px 16px 11px 40px;font-size:15px;color:var(--text);outline:none;font-family:var(--ff-body);transition:border-color .2s}
    .srch input:focus{border-color:rgba(0,229,255,.3)}
    .srch .si{position:absolute;left:13px;top:50%;transform:translateY(-50%);pointer-events:none}
    /* LABELS */
    .slabel{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:18px 20px 10px;display:block}
    /* ACTIVE BANNER */
    .abanner{margin:0 20px 16px;background:linear-gradient(135deg,rgba(0,229,255,.08),rgba(0,224,150,.05));border:1px solid rgba(0,229,255,.2);border-radius:var(--radius);padding:14px;cursor:pointer}
    .abrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .abcountry{display:flex;align-items:center;gap:10px}
    .abflag{font-size:22px}
    .abname{font-family:var(--ff-head);font-weight:700;font-size:15px}
    .abbadge{font-size:10px;background:var(--green);color:#000;padding:3px 10px;border-radius:20px;font-weight:800}
    /* USAGE BAR */
    .ubg{height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;margin-bottom:4px}
    .ufill{height:100%;border-radius:3px;transition:width .5s}
    .ufill.g{background:linear-gradient(90deg,var(--accent),var(--green))}
    .ufill.o{background:linear-gradient(90deg,#ff8800,#ffaa00)}
    .ufill.r{background:linear-gradient(90deg,var(--red),#ff8800)}
    .ulabels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
    /* COUNTRY GRID */
    .cgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 20px}
    .ccard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s}
    .ccard:active{transform:scale(.97)}
    .cflag{width:100%;height:78px;display:flex;align-items:center;justify-content:center;font-size:44px;background:var(--surface2)}
    .cinfo{padding:10px 12px}
    .cname{font-family:var(--ff-head);font-weight:700;font-size:14px;margin-bottom:2px}
    .cfrom{font-size:12px;color:var(--accent);font-weight:600}
    /* PLAN CARDS */
    .pback{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:14px 20px 8px;display:flex;align-items:center;gap:6px;font-family:var(--ff-body);width:100%}
    .phero{padding:0 20px 18px;border-bottom:1px solid var(--border);margin-bottom:8px}
    .pcountry{font-family:var(--ff-head);font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
    .psub{font-size:13px;color:var(--muted)}
    .pcard{margin:0 20px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
    .pcard::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--green));opacity:0;transition:opacity .2s}
    .pcard.pop{border-color:rgba(0,229,255,.3)}
    .pcard.pop::after{opacity:1}
    .popbadge{position:absolute;top:12px;right:12px;font-size:10px;background:linear-gradient(135deg,var(--accent),var(--green));color:#000;padding:3px 10px;border-radius:20px;font-weight:800}
    .ptop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    .pdata{font-family:var(--ff-head);font-size:32px;font-weight:800;line-height:1;letter-spacing:-1px}
    .pdata span{font-size:14px;font-weight:500;color:var(--muted)}
    .pprice{font-family:var(--ff-head);font-size:24px;font-weight:800;color:var(--accent);text-align:right}
    .pgst{font-size:11px;color:var(--muted);margin-top:2px}
    .ptags{display:flex;gap:8px;flex-wrap:wrap}
    .ptag{font-size:11px;background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:20px;color:var(--muted)}
    .ptag.sp{color:var(--accent);border-color:rgba(0,229,255,.2)}
    /* CHECKOUT */
    .coscreen{display:flex;flex-direction:column;height:100%}
    .cohdr{padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
    .coback{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:0 0 10px;display:flex;align-items:center;gap:6px;font-family:var(--ff-body)}
    .stepdots{display:flex;gap:6px;margin-bottom:10px}
    .sdot{height:4px;border-radius:2px;transition:all .3s}
    .sdot.a,.sdot.d{background:var(--accent)}
    .sdot.d{opacity:.4}
    .sdot.i{background:var(--border)}
    .cotitle{font-family:var(--ff-head);font-size:20px;font-weight:800}
    .cosub{font-size:13px;color:var(--muted);margin-top:2px}
    .cobody{flex:1;overflow-y:auto;padding:18px 20px;scrollbar-width:none}
    .cobody::-webkit-scrollbar{display:none}
    /* ORDER CARD */
    .ocard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
    .otop{display:flex;align-items:center;gap:14px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
    .oflag{font-size:36px}
    .opname{font-family:var(--ff-head);font-weight:700;font-size:16px}
    .opcountry{font-size:13px;color:var(--muted);margin-top:2px}
    .sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
    .si-item label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:2px}
    .si-item value{font-size:14px;font-weight:600;display:block}
    .prow{display:flex;justify-content:space-between;font-size:14px;padding:5px 0}
    .prow.tot{border-top:1px solid var(--border);margin-top:6px;padding-top:10px;font-family:var(--ff-head);font-weight:800;font-size:18px}
    /* VIRTUAL NUMBER */
    .vncard{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;transition:border-color .2s}
    .vncard.yes{border-color:var(--green);background:rgba(0,224,150,.03)}
    .vnhead{padding:14px 16px;display:flex;align-items:center;gap:12px}
    .vnicon{width:46px;height:46px;border-radius:12px;background:rgba(0,229,255,.1);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .vninfo{flex:1}
    .vntitle{font-weight:700;font-size:15px;margin-bottom:2px}
    .vnprice{font-size:12px;color:var(--accent);font-weight:600}
    .vntoggle{display:flex;background:var(--surface2);border-radius:10px;padding:3px;gap:3px}
    .vnbtn{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .2s;font-family:var(--ff-body)}
    .vnbtn.yes.on{background:var(--green);color:#000}
    .vnbtn.no.on{background:var(--surface);color:var(--text)}
    .vnexp{border-top:1px solid var(--border);padding:14px 16px}
    .whybtn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--ff-body);margin-bottom:10px}
    .vnreason{display:flex;align-items:flex-start;gap:8px;font-size:13px;line-height:1.5;color:var(--muted);margin-bottom:6px}
    .vncs{background:var(--surface);border:1px solid rgba(0,229,255,.2);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px}
    .vcslabel{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:block}
    select.ifield,input.ifield{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:14px;color:var(--text);outline:none;font-family:var(--ff-body)}
    /* PAYMENT */
    .pmopt{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .2s;margin-bottom:10px}
    .pmopt.on{border-color:var(--accent);background:rgba(0,229,255,.04)}
    .pmicon{font-size:28px;width:40px;text-align:center}
    .pmname{font-weight:700;font-size:15px}
    .pmdesc{font-size:12px;color:var(--muted);margin-top:2px}
    .pmcheck{margin-left:auto;color:var(--green);font-size:18px;font-weight:700}
    .igroup{margin-bottom:14px}
    .ilabel{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
    .irow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    /* CONFIRM */
    .confirmsc{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;text-align:center;min-height:100%}
    .conficon{font-size:64px;margin-bottom:14px}
    .conftitle{font-family:var(--ff-head);font-size:28px;font-weight:800;margin-bottom:8px}
    .confsub{font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.6}
    .qrbox{width:150px;height:150px;background:var(--surface);border:1px solid var(--border);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:56px;margin-bottom:22px}
    .instbox{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:left;margin-bottom:16px}
    .insttitle{font-weight:700;font-size:14px;margin-bottom:10px}
    .inststep{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:8px}
    .instnum{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#000;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    /* MY PLANS */
    .ptabs{display:flex;gap:4px;padding:14px 20px 0;border-bottom:1px solid var(--border)}
    .ptab{padding:9px 18px;font-size:14px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--muted);font-family:var(--ff-body);border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px}
    .ptab.on{color:var(--accent);border-bottom-color:var(--accent)}
    .ecard{margin:14px 20px 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
    .ectop{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .ecflag{font-size:26px}
    .ecname{font-family:var(--ff-head);font-weight:700;font-size:15px}
    .ecplan{font-size:12px;color:var(--muted);margin-top:2px}
    .ecbadge{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:800}
    .ecbadge.act{background:rgba(0,224,150,.15);color:var(--green)}
    .ecbadge.exp{background:rgba(255,80,80,.15);color:var(--red)}
    .ecbtns{display:flex;gap:8px;margin-top:12px}
    .ecbtn{flex:1;padding:9px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--ff-body);transition:all .2s}
    .ecbtn.pr{background:var(--accent);color:#000;border-color:var(--accent)}
    .ecbtn.ai{background:rgba(0,229,255,.1);color:var(--accent);border-color:rgba(0,229,255,.2)}
    /* ADMIN */
    .adhdr{padding:18px 20px;border-bottom:1px solid var(--border)}
    .adtitle{font-family:var(--ff-head);font-size:22px;font-weight:800}
    .addate{font-size:13px;color:var(--muted);margin-top:4px}
    .sgridx{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 20px}
    .scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
    .sclabel{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
    .scval{font-family:var(--ff-head);font-size:22px;font-weight:800}
    .scval.g{color:var(--green)}.scval.a{color:var(--accent)}.scval.gold{color:var(--gold)}
    .scch{font-size:11px;color:var(--muted);margin-top:4px}
    .walletc{background:linear-gradient(135deg,rgba(0,229,255,.1),rgba(0,224,150,.06));border:1px solid rgba(0,229,255,.2);border-radius:var(--radius);padding:18px;margin:0 20px 14px}
    .wlabel{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
    .wbal{font-family:var(--ff-head);font-size:28px;font-weight:800;color:var(--accent)}
    .rchdr{display:flex;align-items:center;justify-content:space-between;padding:0 20px;margin-bottom:10px}
    .rctitle{font-family:var(--ff-head);font-weight:700;font-size:16px}
    .rcitem{display:flex;align-items:center;gap:12px;padding:11px 20px;border-bottom:1px solid var(--border)}
    .rcflag{font-size:26px;width:36px;text-align:center}
    .rccust{font-weight:600;font-size:14px}
    .rcplan{font-size:12px;color:var(--muted);margin-top:2px}
    .rcamt{margin-left:auto;color:var(--green);font-weight:700;font-size:14px}
    /* PROFILE */
    .profsc{padding:20px}
    .profav{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--green));display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 10px}
    .profname{font-family:var(--ff-head);font-size:20px;font-weight:800;text-align:center;margin-bottom:4px}
    .profemail{font-size:13px;color:var(--muted);text-align:center;margin-bottom:22px}
    .profsect{margin-bottom:20px}
    .profstitle{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px}
    .profrow{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer}
    .profleft{display:flex;align-items:center;gap:10px}
    .proflabel{font-size:14px;font-weight:500}
    .profright{color:var(--muted);font-size:13px}
    /* TRAVEL COMPANION */
    .tcscreen{padding-bottom:calc(var(--nav-h)+16px)}
    .tchero{background:linear-gradient(135deg,rgba(0,229,255,.09),rgba(0,224,150,.05));border-bottom:1px solid var(--border);padding:14px 20px 0}
    .tcback{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:0;margin-bottom:12px;display:flex;align-items:center;gap:6px;font-family:var(--ff-body)}
    .tcflag{font-size:34px;margin-bottom:6px;display:block}
    .tccname{font-family:var(--ff-head);font-size:22px;font-weight:800;margin-bottom:2px}
    .tcpow{font-size:11px;color:var(--muted);margin-bottom:14px}
    .tctabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
    .tctabs::-webkit-scrollbar{display:none}
    .tctab{padding:9px 13px;border-radius:10px 10px 0 0;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;border:none;background:transparent;color:var(--muted);font-family:var(--ff-body);border-bottom:2px solid transparent;transition:all .2s}
    .tctab.on{color:var(--accent);border-bottom-color:var(--accent);background:rgba(0,229,255,.06)}
    .tcbody{padding:16px 20px}
    .tcloading{display:flex;flex-direction:column;align-items:center;padding:48px 20px;gap:14px}
    .spinner{width:42px;height:42px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--accent);animation:spin .8s linear infinite}
    .tcloadtxt{font-size:13px;color:var(--muted);text-align:center;line-height:1.7}
    /* INTEL */
    .isect{margin-bottom:18px}
    .isecttitle{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px}
    .icard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px}
    .icardtitle{font-weight:700;font-size:14px;margin-bottom:5px;line-height:1.4}
    .icardbody{font-size:13px;color:var(--muted);line-height:1.6}
    .icardsrc{font-size:11px;color:var(--accent);margin-top:6px;font-weight:600}
    .sevbadge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;margin-bottom:6px}
    .sevh{background:rgba(255,80,80,.15);color:var(--red)}
    .sevm{background:rgba(255,165,0,.15);color:orange}
    .sevl{background:rgba(0,224,150,.15);color:var(--green)}
    /* WEATHER */
    .whero{background:linear-gradient(135deg,rgba(0,229,255,.08),rgba(0,224,150,.05));border:1px solid rgba(0,229,255,.15);border-radius:18px;padding:22px;margin-bottom:14px;text-align:center}
    .wicon{font-size:50px;margin-bottom:8px;display:block}
    .wtemp{font-family:var(--ff-head);font-size:50px;font-weight:800;line-height:1}

const COUNTRIES=[

const rate=num=>{
  if(!num)return null;
  if(num.startsWith("+65"))return{c:"Singapore",r:0.05};
  if(num.startsWith("+61"))return{c:"Australia",r:0.05};

// ── CLAUDE API ──
async function callClaude(system,user){
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system,messages:[{role:"user",content:user}]})
  });
  const d=await r.json();
  const txt=d.content?.map(b=>b.text||"").join("")||"";
  return JSON.parse(txt.replace(/```json|```/g,"").trim());
}

// ── STATE ──
let S={
  screen:"home",tab:"home",

};

function nav(s){
  S.screen=s;

}

function setState(obj){Object.assign(S,obj);render();}

  Object.assign(S,{compCountry:country,compTab:"intel",recoFilter:"all",activeDayIdx:0,
    intelData:null,recoData:null,itinData:null,compError:null,compLoading:true});

  try{
    const[intel,reco,itin]=await Promise.all([
      callClaude("Travel intelligence assistant. Return ONLY valid JSON, no markdown.",
        `Destination briefing for ${country.name}. Return JSON:
{"current_affairs":[{"headline":"str","summary":"str","source":"str"}],
"economy":{"currency_code":"str","exchange_rate_to_sgd":1.0,"summary":"str","cost_tips":["str"]},
"weather":{"current_conditions":"str","temp_c":25,"icon":"🌤","forecast":[{"date":"Mon","high_c":28,"low_c":22,"description":"str","icon":"🌤"}]},
"safety":[{"title":"str","description":"str","severity":"low"}],
"events":[{"name":"str","date":"str","description":"str"}],

      callClaude("Travel recommendations engine. Return ONLY a valid JSON array, no markdown.",

[{"name":"str","category":"food|attraction|experience|transport|shopping","description":"str","source_type":"publisher|ai_generated","source_name":"str","icon":"emoji"}]`),
      callClaude("Expert travel planner. Return ONLY a valid JSON array, no markdown.",

    ]);
    Object.assign(S,{intelData:intel,recoData:Array.isArray(reco)?reco:[],itinData:Array.isArray(itin)?itin:[],compLoading:false});
  }catch(e){

// ── DIALLER ──
let callTimerInt=null;
function startCall(){
  if(S.walletBal<0.10){showToast("❌ Insufficient balance");return;}
  setState({callState:"calling",callDur:0,callCost:0});
  setTimeout(()=>{
    setState({callState:"connected"});
    callTimerInt=setInterval(()=>{
      const r2=rate(S.dialNum)?.r||0.08;
      S.callDur++;
      S.callCost=+((S.callDur/60)*r2).toFixed(3);
      S.walletBal=Math.max(0,+(S.walletBal-(r2/60)).toFixed(3));
      render();
    },1000);
  },2000);
}
function endCall(){
  clearInterval(callTimerInt);
  setState({callState:"ended"});
  setTimeout(()=>setState({callState:"idle"}),2000);
}
function pressKey(k){
  if(S.callState!=="idle")return;
  if(k==="del")setState({dialNum:S.dialNum.slice(0,-1)});
  else setState({dialNum:(S.dialNum+k).slice(0,16)});
}
function fmtDur(s){return`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;}
function fmtNum(n){if(!n)return"";if(n.length<=4)return n;if(n.length<=8)return n.slice(0,4)+" "+n.slice(4);return n.slice(0,4)+" "+n.slice(4,8)+" "+n.slice(8);}

// ── RENDER ──
function e(tag,props,...children){
  const el=document.createElement(tag);
  if(props)Object.entries(props).forEach(([k,v])=>{
    if(k==="className")el.className=v;
    else if(k==="style")Object.assign(el.style,v);
    else if(k==="innerHTML")el.innerHTML=v;
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="disabled")el.disabled=v;
    else if(k==="value")el.value=v;
    else if(k==="selected")el.selected=v;
    else if(k==="placeholder")el.placeholder=v;
    else if(k==="type")el.type=v;
    else el.setAttribute(k,v);
  });
  children.flat().forEach(c=>{
    if(c==null||c===false)return;
    el.appendChild(typeof c==="string"?document.createTextNode(c):c);
  });
  return el;
}
function div(cls,...ch){return e("div",{className:cls},...ch);}
function btn(cls,txt,onclick){const b=e("button",{className:cls,onClick:onclick});b.textContent=txt;return b;}
function span(cls,txt){const s=e("span",{className:cls});s.textContent=txt;return s;}
function h(tag,cls,txt){const el=document.createElement(tag);el.className=cls;el.textContent=txt;return el;}

function renderCountryPlans(){

    const ps=div("profsect"); ps.append(h("div","profstitle",title));
    rows.forEach(([ico,lbl,val])=>{
      const pr=div("profrow");
      pr.append(div("profleft",span("",ico+" "),span("proflabel",lbl)),span("profright",val));
      pr.addEventListener("click",()=>showToast(ico+" "+lbl+" tapped"));
      ps.append(pr);
    });
    d.append(ps);
  });
  return d;
}

// ── MAIN RENDER ──
const NAV_ITEMS=[
  {id:"home",icon:"🌍",label:"Explore"},
  {id:"plans",icon:"📡",label:"My Plans"},
  {id:"companion",icon:"🤖",label:"AI Travel"},
  {id:"dialler",icon:"📞",label:"Calls"},
  {id:"admin",icon:"📊",label:"Dashboard"},
];

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  const now=new Date();
  const ts=now.toLocaleTimeString("en-SG",{hour:"2-digit",minute:"2-digit",hour12:false});

  const phone=div("phone");
  phone.append(div("island"));

  const sb=div("sbar");
  sb.append(span("stime",ts),div("sicons","●●●  WiFi  🔋"));
  phone.append(sb);

  const sw=div("swrap");
  const sc=div("screen");

  let content;
  if(S.screen==="home")content=renderHome();
  else if(S.screen==="countryPlans")content=renderCountryPlans();
  else if(S.screen==="checkout")content=renderCheckout();
  else if(S.screen==="plans")content=renderMyPlans();
  else if(S.screen==="companion")content=renderTravelCompanion();
  else if(S.screen==="dialler")content=renderDialler();
  else if(S.screen==="admin")content=renderAdmin();
  else if(S.screen==="profile")content=renderProfile();
  else content=renderHome();

  sc.append(content);

  const bnav=div("bnav");
  NAV_ITEMS.forEach(item=>{
    const ni=div("ni"+(S.tab===item.id?" on":""));
    ni.append(span("ico",item.icon),document.createTextNode(item.label));
    ni.addEventListener("click",()=>{S.tab=item.id;nav(item.id);});
    bnav.append(ni);
  });

  sw.append(sc,bnav);
  if(S.toast){const t=div("toast");t.textContent=S.toast;sw.append(t);}
  phone.append(sw);
  app.append(phone);
}

render();
setInterval(()=>{
  if(S.callState!=="connected")render();
},30000);
</script>
