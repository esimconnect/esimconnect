<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#080b12"/>
  <title>eSIM Connect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080b12;--surface:#0e1420;--surface2:#141b2a;
      --border:rgba(255,255,255,0.07);--text:#f0f4ff;--muted:#7a8aaa;
      --accent:#00e5ff;--green:#00e096;--gold:#ffd166;--red:#ff5050;
      --radius:16px;--nav-h:64px;
      --font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
    }
    html,body,#root{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body)}
    input,button,select,textarea{font-family:var(--font-body)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
    @keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
    .fadeUp{animation:fadeUp .5s ease forwards}
    .fadeIn{animation:fadeIn .4s ease forwards}
    /* PHONE FRAME */
    .phone-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);padding:20px}
    .phone{width:390px;height:844px;background:var(--bg);border-radius:50px;border:2px solid rgba(255,255,255,0.08);overflow:hidden;position:relative;box-shadow:0 40px 80px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.04);display:flex;flex-direction:column}
    .island{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:120px;height:34px;background:#000;border-radius:20px;z-index:200}
    .status-bar{height:54px;flex-shrink:0;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 10px;z-index:100;position:relative}
    .status-time{font-family:var(--font-head);font-size:15px;font-weight:700}
    .status-icons{display:flex;align-items:center;gap:6px;font-size:12px}
    .screen-wrap{flex:1;overflow:hidden;position:relative}
    .screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:calc(var(--nav-h)+16px)}
    .screen::-webkit-scrollbar{display:none}
    /* BOTTOM NAV */
    .bottom-nav{position:absolute;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(8,11,18,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;z-index:100;padding-bottom:8px}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:8px 12px;border-radius:12px;transition:all .2s;color:var(--muted);font-size:10px;font-weight:600;letter-spacing:.3px;min-width:48px}
    .nav-item.active{color:var(--accent)}
    .nav-item .ni{font-size:20px;transition:transform .2s}
    .nav-item.active .ni{transform:translateY(-2px)}
    /* HEADER */
    .app-header{padding:20px 20px 16px;background:linear-gradient(180deg,var(--surface) 0%,transparent 100%);position:sticky;top:0;z-index:50;backdrop-filter:blur(10px)}
    .header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .logo{font-family:var(--font-head);font-size:22px;font-weight:800;letter-spacing:-.5px}
    .logo span{color:var(--accent)}
    .header-badge{font-size:11px;background:rgba(0,224,150,.1);color:var(--green);padding:4px 10px;border-radius:20px;font-weight:700}
    /* SEARCH */
    .search-wrap{position:relative}
    .search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:12px 16px 12px 42px;font-size:15px;color:var(--text);outline:none;transition:border-color .2s}
    .search-input:focus{border-color:rgba(0,229,255,.3)}
    .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
    /* SECTION */
    .section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:20px 20px 12px;display:block}
    /* ACTIVE BANNER */
    .active-banner{margin:0 20px 20px;background:linear-gradient(135deg,rgba(0,229,255,.08),rgba(0,224,150,.06));border:1px solid rgba(0,229,255,.2);border-radius:var(--radius);padding:16px;cursor:pointer}
    .active-banner-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .active-country{display:flex;align-items:center;gap:10px}
    .active-flag{font-size:24px}
    .active-name{font-family:var(--font-head);font-weight:700;font-size:16px}
    .active-badge{font-size:10px;background:var(--green);color:#000;padding:3px 10px;border-radius:20px;font-weight:800}
    .usage-bar-bg{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-bottom:6px}
    .usage-bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
    .usage-bar-fill.green{background:linear-gradient(90deg,var(--accent),var(--green))}
    .usage-bar-fill.orange{background:linear-gradient(90deg,#ff8800,#ffaa00)}
    .usage-bar-fill.red{background:linear-gradient(90deg,var(--red),#ff8800)}
    .usage-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
    /* COUNTRY GRID */
    .country-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 20px}
    .country-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s}
    .country-card:active{transform:scale(.97)}
    .country-card:hover{border-color:rgba(0,229,255,.2);transform:translateY(-2px)}
    .country-flag-img{width:100%;height:80px;object-fit:cover}
    .country-flag-emoji{width:100%;height:80px;display:flex;align-items:center;justify-content:center;font-size:44px;background:var(--surface2)}
    .country-info{padding:10px 12px}
    .country-name{font-family:var(--font-head);font-weight:700;font-size:14px;margin-bottom:2px}
    .country-from{font-size:12px;color:var(--accent);font-weight:600}
    /* PLANS */
    .plans-screen{padding:0 0 20px}
    .plans-back{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:16px 20px 8px;display:flex;align-items:center;gap:6px;font-family:var(--font-body);width:100%}
    .plans-hero{padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:8px}
    .plans-country{font-family:var(--font-head);font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
    .plans-sub{font-size:13px;color:var(--muted)}
    .plan-card{margin:0 20px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
    .plan-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--green));opacity:0;transition:opacity .2s}
    .plan-card:hover{border-color:rgba(0,229,255,.25);transform:translateY(-2px)}
    .plan-card:hover::after{opacity:1}
    .plan-card.popular{border-color:rgba(0,229,255,.3)}
    .plan-card.popular::after{opacity:1}
    .popular-badge{position:absolute;top:12px;right:12px;font-size:10px;background:linear-gradient(135deg,var(--accent),var(--green));color:#000;padding:3px 10px;border-radius:20px;font-weight:800}
    .plan-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    .plan-data{font-family:var(--font-head);font-size:32px;font-weight:800;line-height:1;letter-spacing:-1px}
    .plan-data span{font-size:14px;font-weight:500;color:var(--muted)}
    .plan-price{font-family:var(--font-head);font-size:24px;font-weight:800;color:var(--accent)}
    .plan-gst{font-size:11px;color:var(--muted);margin-top:2px}
    .plan-tags{display:flex;gap:8px;flex-wrap:wrap}
    .plan-tag{font-size:11px;background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:20px;color:var(--muted)}
    .plan-tag.speed{color:var(--accent);border-color:rgba(0,229,255,.2)}
    /* CHECKOUT */
    .checkout-screen{display:flex;flex-direction:column;height:100%}
    .checkout-header{padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
    .checkout-back{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:0 0 12px;display:flex;align-items:center;gap:6px;font-family:var(--font-body)}
    .step-dots{display:flex;gap:6px;margin-bottom:12px}
    .step-dot{height:4px;border-radius:2px;transition:all .3s}
    .step-dot.done,.step-dot.active{background:var(--accent)}
    .step-dot.done{opacity:.4}
    .step-dot.inactive{background:var(--border)}
    .checkout-title{font-family:var(--font-head);font-size:20px;font-weight:800}
    .checkout-sub{font-size:13px;color:var(--muted);margin-top:2px}
    .checkout-body{flex:1;overflow-y:auto;padding:20px}
    .checkout-body::-webkit-scrollbar{display:none}
    /* ORDER SUMMARY */
    .order-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
    .order-top{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}
    .order-flag{font-size:36px}
    .order-plan-name{font-family:var(--font-head);font-weight:700;font-size:16px}
    .order-country-name{font-size:13px;color:var(--muted);margin-top:2px}
    .spec-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}
    .spec-item label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px}
    .spec-item value{font-size:14px;font-weight:600}
    .price-row{display:flex;justify-content:space-between;font-size:14px;padding:6px 0}
    .price-row.total{border-top:1px solid var(--border);margin-top:6px;padding-top:12px;font-family:var(--font-head);font-weight:800;font-size:18px}
    /* VIRTUAL NUMBER */
    .vn-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;transition:all .2s}
    .vn-card.yes{border-color:var(--green);background:rgba(0,224,150,.04)}
    .vn-card.no{border-color:var(--border);opacity:.6}
    .vn-head{padding:16px 18px;display:flex;align-items:center;gap:14px}
    .vn-icon{width:48px;height:48px;border-radius:12px;background:rgba(0,229,255,.1);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
    .vn-info{flex:1}
    .vn-title{font-weight:700;font-size:15px;margin-bottom:3px}
    .vn-price{font-size:12px;color:var(--accent);font-weight:600}
    .vn-toggle{display:flex;background:var(--surface2);border-radius:10px;padding:3px;gap:3px}
    .vn-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .2s;font-family:var(--font-body)}
    .vn-btn.yes.active{background:var(--green);color:#000}
    .vn-btn.no.active{background:var(--surface);color:var(--text)}
    .vn-explainer{border-top:1px solid var(--border);padding:16px 18px}
    .why-btn{display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);margin-bottom:12px}
    .vn-reasons{display:flex;flex-direction:column;gap:8px}
    .vn-reason{display:flex;align-items:flex-start;gap:10px;font-size:13px;line-height:1.5;color:var(--muted)}
    .vn-reason strong{color:var(--text)}
    /* PAYMENT */
    .payment-methods{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
    .payment-opt{display:flex;align-items:center;gap:14px;padding:16px;background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .2s}
    .payment-opt.selected{border-color:var(--accent);background:rgba(0,229,255,.04)}
    .payment-opt-icon{font-size:28px;width:44px;text-align:center}
    .payment-opt-name{font-weight:700;font-size:15px}
    .payment-opt-desc{font-size:12px;color:var(--muted);margin-top:2px}
    .payment-check{margin-left:auto;color:var(--green);font-size:18px;font-weight:700}
    .input-group{margin-bottom:16px}
    .input-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:8px}
    .input-field{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:13px 16px;font-size:15px;color:var(--text);outline:none;transition:border-color .2s}
    .input-field:focus{border-color:rgba(0,229,255,.4)}
    .input-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    /* CONFIRM */
    .confirm-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;text-align:center;min-height:100%}
    .confirm-icon{font-size:64px;margin-bottom:16px;animation:fadeIn .5s ease}
    .confirm-title{font-family:var(--font-head);font-size:28px;font-weight:800;margin-bottom:8px}
    .confirm-sub{font-size:15px;color:var(--muted);margin-bottom:28px;line-height:1.6}
    .qr-box{width:160px;height:160px;background:var(--surface);border:1px solid var(--border);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:60px;margin-bottom:24px}
    .instructions{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:left;margin-bottom:20px}
    .inst-title{font-weight:700;font-size:14px;margin-bottom:12px}
    .inst-step{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;font-size:13px;color:var(--muted);line-height:1.5}
    .inst-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#000;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    /* MY PLANS */
    .plans-tabs{display:flex;gap:4px;padding:16px 20px 0;border-bottom:1px solid var(--border)}
    .plans-tab{padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--muted);font-family:var(--font-body);border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px}
    .plans-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
    .esim-card{margin:16px 20px 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
    .esim-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .esim-country{display:flex;align-items:center;gap:10px}
    .esim-flag{font-size:28px}
    .esim-country-name{font-family:var(--font-head);font-weight:700;font-size:16px}
    .esim-plan{font-size:12px;color:var(--muted);margin-top:2px}
    .esim-status-badge{font-size:10px;padding:4px 12px;border-radius:20px;font-weight:800}
    .esim-status-badge.active{background:rgba(0,224,150,.15);color:var(--green)}
    .esim-status-badge.expired{background:rgba(255,80,80,.15);color:var(--red)}
    .esim-actions{display:flex;gap:8px;margin-top:14px}
    .esim-btn{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font-body);transition:all .2s}
    .esim-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}
    .esim-btn.ai{background:rgba(0,229,255,.1);color:var(--accent);border-color:rgba(0,229,255,.2)}
    /* ADMIN */
    .admin-screen{padding:0 0 20px}
    .admin-header{padding:20px;border-bottom:1px solid var(--border)}
    .admin-title{font-family:var(--font-head);font-size:24px;font-weight:800}
    .admin-date{font-size:13px;color:var(--muted);margin-top:4px}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px 20px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
    .stat-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
    .stat-val{font-family:var(--font-head);font-size:24px;font-weight:800}
    .stat-val.green{color:var(--green)}
    .stat-val.accent{color:var(--accent)}
    .stat-val.gold{color:var(--gold)}
    .stat-change{font-size:11px;color:var(--muted);margin-top:4px}
    .wallet-card{background:linear-gradient(135deg,rgba(0,229,255,.1),rgba(0,224,150,.06));border:1px solid rgba(0,229,255,.2);border-radius:var(--radius);padding:20px;margin:0 20px 16px}
    .wallet-label{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
    .wallet-balance{font-family:var(--font-head);font-size:30px;font-weight:800;color:var(--accent)}
    .wallet-warn{font-size:12px;color:var(--gold);margin-top:8px}
    .recent-header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;margin-bottom:12px}
    .recent-title{font-family:var(--font-head);font-weight:700;font-size:16px}
    .recent-item{display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid var(--border)}
    .recent-flag{font-size:28px;width:40px;text-align:center}
    .recent-customer{font-weight:600;font-size:14px}
    .recent-plan{font-size:12px;color:var(--muted);margin-top:2px}
    .recent-amount{margin-left:auto;color:var(--green);font-weight:700;font-size:15px}
    /* PROFILE */
    .profile-screen{padding:20px}
    .profile-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--green));display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px}
    .profile-name{font-family:var(--font-head);font-size:22px;font-weight:800;text-align:center;margin-bottom:4px}
    .profile-email{font-size:13px;color:var(--muted);text-align:center;margin-bottom:24px}
    .profile-section{margin-bottom:24px}
    .profile-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px}
    .profile-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer}
    .profile-row-left{display:flex;align-items:center;gap:12px}
    .profile-row-icon{font-size:20px;width:36px;text-align:center}
    .profile-row-label{font-size:15px;font-weight:500}
    .profile-row-right{color:var(--muted);font-size:14px}
    /* TRAVEL COMPANION */
    .companion-screen{padding-bottom:calc(var(--nav-h)+16px)}
    .companion-hero{background:linear-gradient(135deg,rgba(0,229,255,.1),rgba(0,224,150,.06));border-bottom:1px solid var(--border);padding:16px 20px 0}
    .companion-back{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:0;margin-bottom:12px;display:flex;align-items:center;gap:6px;font-family:var(--font-body)}
    .companion-flag{font-size:36px;margin-bottom:6px;display:block}
    .companion-cname{font-family:var(--font-head);font-size:22px;font-weight:800;margin-bottom:2px}
    .companion-powered{font-size:11px;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:6px}
    .comp-tabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding-bottom:0}
    .comp-tabs::-webkit-scrollbar{display:none}
    .comp-tab{padding:9px 14px;border-radius:10px 10px 0 0;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;border:none;background:transparent;color:var(--muted);font-family:var(--font-body);border-bottom:2px solid transparent;transition:all .2s}
    .comp-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(0,229,255,.06)}
    .companion-body{padding:16px 20px}
    .comp-loading{display:flex;flex-direction:column;align-items:center;padding:48px 20px;gap:16px}
    .spinner{width:44px;height:44px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--accent);animation:spin .8s linear infinite}
    .comp-loading-text{font-size:13px;color:var(--muted);text-align:center;line-height:1.7}
    /* INTEL */
    .intel-section{margin-bottom:20px}
    .intel-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── MOCK DATA ──
const MOCK_PLANS = [
  { id:1, country:"Japan", flag:"🇯🇵", slug:"japan", data:"10 GB", day:7, price:14.17, speed:"4G/5G", used:4.2, total:10 },
];
const MOCK_HISTORY = [
  { id:2, country:"Thailand", flag:"🇹🇭", plan:"Unlimited 7 Days", amount:14.17, date:"Feb 2026", status:"expired" },
  { id:3, country:"Korea", flag:"🇰🇷", plan:"5GB 5 Days", amount:9.70, date:"Jan 2026", status:"expired" },
];
const COUNTRIES = [
  { name:"Japan",        flag:"🇯🇵", slug:"japan",        from:9 },
  { name:"South Korea",  flag:"🇰🇷", slug:"south-korea",  from:9 },
  { name:"Thailand",     flag:"🇹🇭", slug:"thailand",     from:8 },
  { name:"Australia",    flag:"🇦🇺", slug:"australia",    from:12 },
  { name:"UK",           flag:"🇬🇧", slug:"united-kingdom",from:12},
  { name:"USA",          flag:"🇺🇸", slug:"usa",          from:14 },
  { name:"Germany",      flag:"🇩🇪", slug:"germany",      from:11 },
  { name:"Hong Kong",    flag:"🇭🇰", slug:"hong-kong",    from:8 },
  { name:"Taiwan",       flag:"🇹🇼", slug:"taiwan",       from:9 },
  { name:"Malaysia",     flag:"🇲🇾", slug:"malaysia",     from:6 },
  { name:"Indonesia",    flag:"🇮🇩", slug:"indonesia",    from:7 },
  { name:"Vietnam",      flag:"🇻🇳", slug:"vietnam",      from:7 },
  { name:"France",       flag:"🇫🇷", slug:"france",       from:12 },
  { name:"Italy",        flag:"🇮🇹", slug:"italy",        from:12 },
  { name:"Spain",        flag:"🇪🇸", slug:"spain",        from:11 },
  { name:"India",        flag:"🇮🇳", slug:"india",        from:8 },
];
const PACKAGES = {
  default: [
    { id:1, data:"3 GB",     day:7,  price:9.00,  speed:"4G" },
    { id:2, data:"5 GB",     day:10, price:12.00, speed:"4G/5G", popular:true },
    { id:3, data:"10 GB",    day:15, price:16.00, speed:"4G/5G" },
    { id:4, data:"Unlimited",day:7,  price:18.00, speed:"4G", unlimited:true },
  ]
};
const GST = 0.09;
const sgd = (n) => `SGD $${Number(n).toFixed(2)}`;
const withGST = (n) => +(n * (1+GST)).toFixed(2);

// ── CALL RATES ──
const callRate = (num) => {
  if(!num) return null;
  if(num.startsWith("+65")||num.startsWith("65")) return {country:"Singapore",rate:0.05};
  if(num.startsWith("+61")) return {country:"Australia",rate:0.05};
  if(num.startsWith("+44")) return {country:"United Kingdom",rate:0.05};
  if(num.startsWith("+1"))  return {country:"USA / Canada",rate:0.05};
  if(num.startsWith("+81")) return {country:"Japan",rate:0.06};
  if(num.startsWith("+86")) return {country:"China",rate:0.06};
  if(num.startsWith("+60")) return {country:"Malaysia",rate:0.04};
  if(num.startsWith("+91")) return {country:"India",rate:0.05};
  if(num.startsWith("+49")) return {country:"Germany",rate:0.05};
  if(num.startsWith("+")) return {country:"International",rate:0.08};
  return null;
};

// ── CLAUDE API ──
const callClaude = async (system, user) => {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      system,
      messages:[{role:"user",content:user}]
    })
  });
  const data = await res.json();
  const text = data.content?.map(b=>b.text||"").join("")||"";
  return JSON.parse(text.replace(/```json|```/g,"").trim());
};

// ── MAIN APP ──
export default function App() {
  const [screen, setScreen] = useState("home");
  const [activeTab, setActiveTab] = useState("home");
  const [selectedCountry, setSelectedCountry] = useState(null);
  const [selectedPlan, setSelectedPlan] = useState(null);
  const [checkoutStep, setCheckoutStep] = useState(1);
  const [payMethod, setPayMethod] = useState("paynow");
  const [plansTab, setPlansTab] = useState("active");
  const [searchQ, setSearchQ] = useState("");
  const [loading, setLoading] = useState(false);
  const [toast, setToast] = useState(null);
  const [wantVN, setWantVN] = useState(null);
  const [showWhy, setShowWhy] = useState(false);
  const [homeCountry, setHomeCountry] = useState("");
  // Dialler
  const [dialNum, setDialNum] = useState("");
  const [callState, setCallState] = useState("idle");
  const [callDur, setCallDur] = useState(0);
  const [callCostTotal, setCallCostTotal] = useState(0);
  const [walletBal, setWalletBal] = useState(12.50);
  const callTimerRef = useRef(null);
  // Travel Companion
  const [compCountry, setCompCountry] = useState(null);
  const [compTab, setCompTab] = useState("intel");
  const [compLoading, setCompLoading] = useState(false);
  const [compError, setCompError] = useState(null);
  const [intelData, setIntelData] = useState(null);
  const [recoData, setRecoData] = useState(null);
  const [itinData, setItinData] = useState(null);
  const [recoFilter, setRecoFilter] = useState("all");
  const [activeDayIdx, setActiveDayIdx] = useState(0);

  const showToast = useCallback((msg) => {
    setToast(msg);
    setTimeout(()=>setToast(null), 3000);
  }, []);

  const nav = (s) => {
    setScreen(s);
    if(["home","plans","dialler","admin","profile","companion"].includes(s)) setActiveTab(s);
  };

  const selectCountry = (c) => { setSelectedCountry(c); nav("countryPlans"); };

  const selectPlan = (p) => {
    setSelectedPlan({...p, country:selectedCountry});
    setCheckoutStep(1);
    setWantVN(null);
    setShowWhy(false);
    setHomeCountry("");
    nav("checkout");
  };

  const handlePurchase = async () => {
    setLoading(true);
    await new Promise(r=>setTimeout(r,1800));
    setLoading(false);
    setCheckoutStep(4);
    showToast("✅ eSIM activated!");
  };

  // Travel Companion
  const openCompanion = async (country) => {
    setCompCountry(country);
    setCompTab("intel");
    setRecoFilter("all");
    setActiveDayIdx(0);
    setIntelData(null);
    setRecoData(null);
    setItinData(null);
    setCompError(null);
    nav("companion");
    setCompLoading(true);
    try {
      const [intel, reco, itin] = await Promise.all([
        callClaude(
          "You are a travel intelligence assistant. Return ONLY valid JSON, no markdown.",
          `Destination intelligence briefing for ${country.name}. Return JSON:
{"current_affairs":[{"headline":"string","summary":"string","source":"string"}],
"economy":{"currency_code":"string","exchange_rate_to_sgd":1.0,"summary":"string","cost_tips":["string"]},
"weather":{"current_conditions":"string","temp_c":25,"icon":"🌤","forecast":[{"date":"Mon","high_c":28,"low_c":22,"description":"string","icon":"🌤"}]},
"safety":[{"title":"string","description":"string","severity":"low"}],
"events":[{"name":"string","date":"string","description":"string"}],
"transport":[{"tip":"string"}]}`
        ),
        callClaude(
          "You are a travel recommendations engine. Return ONLY valid JSON array, no markdown.",
          `8 recommendations for ${country.name}. Return JSON array:
[{"name":"string","category":"food|attraction|experience|transport|shopping","description":"string","source_type":"publisher|ai_generated","source_name":"string","icon":"emoji"}]`
        ),
        callClaude(
          "You are an expert travel planner. Return ONLY valid JSON array, no markdown.",
          `3-day itinerary for ${country.name}. Return JSON array:
[{"day_number":1,"title":"string","items":[{"time":"09:00","type":"attraction|food|transport|event","name":"string","description":"string","duration_minutes":90,"notes":null,"icon":"emoji"}]}]`
        ),
      ]);
      setIntelData(intel);
      setRecoData(Array.isArray(reco) ? reco : reco.recommendations || []);
      setItinData(Array.isArray(itin) ? itin : []);
    } catch(e) {
      setCompError("Could not load travel data. Check connection and try again.");
    } finally {
      setCompLoading(false);
    }
  };

  // Dialler
  const fmtDur = (s) => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const pressKey = (k) => {
    if(callState!=="idle") return;
    if(k==="del") setDialNum(p=>p.slice(0,-1));
    else setDialNum(p=>(p+k).slice(0,16));
  };
  const startCall = () => {
    if(walletBal < 0.10) { showToast("❌ Insufficient balance"); return; }
    setCallState("calling"); setCallDur(0); setCallCostTotal(0);
    setTimeout(()=>{
      setCallState("connected");
      let s=0;
      callTimerRef.current = setInterval(()=>{
        s++;
        setCallDur(s);
        const rate = callRate(dialNum)?.rate || 0.08;
        setCallCostTotal(+((s/60)*rate).toFixed(3));
        setWalletBal(prev=>Math.max(0,+(prev-(rate/60)).toFixed(3)));
      },1000);
    },2000);
  };
  const endCall = () => {
    if(callTimerRef.current) clearInterval(callTimerRef.current);
    setCallState("ended");
    setTimeout(()=>setCallState("idle"),2000);
  };

  const filtered = COUNTRIES.filter(c=>c.name.toLowerCase().includes(searchQ.toLowerCase()));

  const now = new Date();
  const timeStr = now.toLocaleTimeString("en-SG",{hour:"2-digit",minute:"2-digit",hour12:false});

  // ── RENDER SCREENS ──

  const renderHome = () => (
    <div className="fadeUp">
      <div className="app-header">
        <div className="header-row">
          <div className="logo">eSIM<span>Connect</span></div>
          <div className="header-badge">🟡 SANDBOX</div>
        </div>
        <div className="search-wrap">
          <span className="search-icon">🔍</span>
          <input className="search-input" placeholder="Search destinations..."
            value={searchQ} onChange={e=>setSearchQ(e.target.value)}/>
        </div>
      </div>

      {MOCK_PLANS.length>0 && !searchQ && (
        <div className="active-banner" onClick={()=>{nav("plans");setPlansTab("active")}}>
          <div className="active-banner-top">
            <div className="active-country">
              <span className="active-flag">{MOCK_PLANS[0].flag}</span>
              <span className="active-name">{MOCK_PLANS[0].country}</span>
            </div>
            <span className="active-badge">ACTIVE</span>

                </div>
              )}
            </>
          )}
        </div>
      </div>
    );
  };

  const renderDialler = () => {
    const rate = callRate(dialNum);
    const fmtNum = (n) => {
      if(!n) return "";
      if(n.length<=4) return n;
      if(n.length<=8) return n.slice(0,4)+" "+n.slice(4);
      return n.slice(0,4)+" "+n.slice(4,8)+" "+n.slice(8);
    };
    return (
      <div className="dialler-screen fadeUp">
        <div className="dialler-title">Outgoing Calls</div>
        <div className="dialler-sub">From your virtual home number</div>
        <div className="wallet-mini">
          <div>
            <div className="wallet-mini-label">Wallet Balance</div>
            <div className="wallet-mini-bal">{sgd(walletBal)}</div>
          </div>
          <button className="esim-btn primary" style={{width:"auto",padding:"8px 14px"}} onClick={()=>showToast("💳 Top-up coming soon!")}>Top Up</button>
        </div>

        {callState==="idle" || callState==="ended" ? (
          <>
            <div className="dialler-input" style={{background:"var(--surface)",borderRadius:16,padding:16,textAlign:"center",marginBottom:8,fontSize:dialNum?32:20,color:dialNum?"var(--text)":"var(--muted)",letterSpacing:2}}>
              {dialNum ? fmtNum(dialNum) : "Enter number"}
            </div>
            {rate && <div className="dialler-rate">{rate.country} · SGD ${rate.rate.toFixed(2)}/min</div>}
            {!rate && dialNum && <div className="dialler-rate" style={{color:"var(--muted)"}}>Enter country code (e.g. +65)</div>}
            {!dialNum && <div style={{height:20}}/>}

            <div className="keypad">
              {[["1",""],["2","ABC"],["3","DEF"],["4","GHI"],["5","JKL"],["6","MNO"],
                ["7","PQRS"],["8","TUV"],["9","WXYZ"],["*",""],["0","+"],["#",""]].map(([k,s])=>(
                <button key={k} className="key" onClick={()=>pressKey(k==="0"&&!dialNum?"+":k)}>
                  {k}<span className="key-sub">{s}</span>
                </button>
              ))}
              <button className="key" onClick={()=>pressKey("del")}>⌫</button>
              <button className="key call" onClick={startCall} disabled={!dialNum||walletBal<0.10}>📞</button>
              <div/>
            </div>
          </>
        ) : (
          <div className="call-state">
            <div className="call-number">{fmtNum(dialNum)}</div>
            <div className="call-status">{callState==="calling"?"📡 Calling...":"🔊 Connected"}</div>
            {callState==="connected" && (
              <>
                <div className="call-duration">{fmtDur(callDur)}</div>
                <div className="call-cost">Cost so far: {sgd(callCostTotal)}</div>
              </>
            )}
            <div style={{marginTop:32}}>
              <button className="key end" style={{width:72,height:72,margin:"0 auto",display:"flex",borderRadius:"50%"}} onClick={endCall}>📵</button>
            </div>
          </div>
        )}
      </div>
    );
  };

  const renderAdmin = () => (
    <div className="admin-screen fadeUp">
      <div className="admin-header">
        <div className="admin-title">Dashboard</div>
        <div className="admin-date">{now.toLocaleDateString("en-SG",{weekday:"long",day:"numeric",month:"long"})}</div>
      </div>
      <div className="stats-grid">
        {[["Today's Revenue","SGD $127.53","green","↑ 9 plans"],["Today's Profit","SGD $38.26","accent","Margin 30%"],
          ["Month Revenue","SGD $3,847","gold",""],["Active Plans","47","",""]].map(([l,v,c,s])=>(
          <div key={l} className="stat-card">
            <div className="stat-label">{l}</div>
            <div className={`stat-val ${c}`}>{v}</div>
            {s && <div className="stat-change">{s}</div>}
          </div>
        ))}
      </div>
      <div className="wallet-card">
        <div className="wallet-label">Airalo Wallet Balance</div>
        <div className="wallet-balance">USD $847.32</div>
      </div>
      <div className="recent-header">
        <div className="recent-title">Recent Transactions</div>
        <span style={{color:"var(--accent)",fontSize:13,fontWeight:600}}>View all</span>
      </div>
      {[["🇯🇵","Li Wei","Japan 5GB","2 mins ago","$16.36"],["🇹🇭","Ahmad B.","Thailand Unlimited","18 mins ago","$16.35"],
        ["🇰🇷","Sarah T.","Korea 3GB","42 mins ago","$9.70"],["🇬🇧","David Ng","UK 5GB","1 hr ago","$14.17"]].map(([f,c,p,t,a])=>(
        <div key={c} className="recent-item">
          <div className="recent-flag">{f}</div>
          <div>
            <div className="recent-customer">{c}</div>
            <div className="recent-plan">{p} · {t}</div>
          </div>
          <div className="recent-amount">+{a}</div>
        </div>
      ))}
    </div>
  );

  const renderProfile = () => (
    <div className="profile-screen fadeUp">
      <div className="profile-avatar">👤</div>
      <div className="profile-name">David Lim</div>
      <div className="profile-email">davidlim@esimconnect.world</div>
      {[["Account",["👤 Personal Info","→"],["🔔 Notifications","→"],["💳 Payment Methods","→"],["📄 Purchase History","→"]],
        ["Virtual Number",["📞 My Virtual Number","+65 XXXX XXXX"],["⚙️ Forwarding Settings","→"],["🌍 Home Country","Singapore"]],
        ["App",["🌐 Language","English"],["⭐ Loyalty Points","0 pts"],["📋 Terms of Service","→"],["🚪 Sign Out","→"]]].map(([title,...rows])=>(
        <div key={title} className="profile-section">
          <div className="profile-section-title">{title}</div>
          {rows.map(([label,value])=>(
            <div key={label} className="profile-row" onClick={()=>showToast(`${label} tapped`)}>
              <div className="profile-row-left">
                <span className="profile-row-icon">{label.split(" ")[0]}</span>
                <span className="profile-row-label">{label.split(" ").slice(1).join(" ")}</span>
              </div>
              <span className="profile-row-right">{value}</span>
            </div>
          ))}
        </div>
      ))}
    </div>
  );

  const NAV = [
    {id:"home",icon:"🌍",label:"Explore"},
    {id:"plans",icon:"📡",label:"My Plans"},
    {id:"companion",icon:"🤖",label:"AI Travel"},
    {id:"dialler",icon:"📞",label:"Calls"},
    {id:"admin",icon:"📊",label:"Dashboard"},
  ];

  return (
    <div className="phone-wrap">
      <div className="phone">
        <div className="island"/>
        <div className="status-bar">
          <span className="status-time">{timeStr}</span>
          <span className="status-icons">
            <span>●●●</span><span>WiFi</span><span>🔋</span>
          </span>
        </div>
        <div className="screen-wrap">
          <div className="screen">
            {screen==="home" && renderHome()}
            {screen==="countryPlans" && renderCountryPlans()}
            {screen==="checkout" && renderCheckout()}
            {screen==="plans" && renderMyPlans()}
            {screen==="companion" && renderTravelCompanion()}
            {screen==="dialler" && renderDialler()}
            {screen==="admin" && renderAdmin()}
            {screen==="profile" && renderProfile()}
          </div>
          <nav className="bottom-nav">
            {NAV.map(item=>(
              <div key={item.id} className={`nav-item ${activeTab===item.id?"active":""}`}
                onClick={()=>{setActiveTab(item.id);nav(item.id)}}>
                <span className="ni">{item.icon}</span>
                {item.label}
              </div>
            ))}
          </nav>
          {toast && <div className="toast">{toast}</div>}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
